spring.application.name=eduai-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Reduce memory usage
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=EduAI_Super_Secret_Key_For_JWT_HS256_Must_Be_At_Least_32_Characters_Long_2024
app.jwt.expiration=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#logging.level.com.eduai=DEBUG
logging.level.com.eduai=INFO

#gemini.api.key=AIzaSyA5SqRtK00dsxAYc5lDu5YZ8CU1-8lyFC4
#gemini.api.url=gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

groq.api.key=${GROQ_API_KEY}
test.value=railway
railway.test=1

